<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>font-size-adjust metric calculator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0c0c0c;
        --surface: #161616;
        --border: #2a2a2a;
        --border-focus: #4a4a4a;
        --text: #e8e4de;
        --text-dim: #7a756d;
        --accent: #c8ff32;
        --accent-dim: #c8ff3220;
        --red: #ff6b6b;
        --mono: 'DM Mono', monospace;
        --serif: 'Instrument Serif', serif;
      }

      body {
        font-family: var(--mono);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 2rem;
        line-height: 1.6;
        font-size: 14px;
      }

      .container {
        max-width: 760px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 3rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--border);
      }

      h1 {
        font-family: var(--serif);
        font-size: 2.4rem;
        font-weight: 400;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }

      h1 span {
        color: var(--accent);
      }

      header p {
        color: var(--text-dim);
        font-size: 0.85rem;
        max-width: 50ch;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
      }

      label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-dim);
      }

      label .optional {
        color: var(--border-focus);
        text-transform: none;
        letter-spacing: 0;
      }

      input[type='text'] {
        font-family: var(--mono);
        font-size: 0.95rem;
        padding: 0.75rem 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
      }

      input[type='text']:focus {
        border-color: var(--accent);
      }

      input::placeholder {
        color: var(--border-focus);
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        margin: 2rem 0;
      }

      button {
        font-family: var(--mono);
        font-size: 0.85rem;
        padding: 0.7rem 1.5rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        transition: all 0.15s;
      }

      button.primary {
        background: var(--accent);
        color: #0c0c0c;
        font-weight: 500;
      }

      button.primary:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }

      button.primary:active {
        transform: translateY(0);
      }

      #status {
        font-size: 0.8rem;
        color: var(--text-dim);
      }

      #status.error {
        color: var(--red);
      }

      .results {
        display: none;
        margin-top: 2.5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border);
      }

      .results.visible {
        display: block;
      }

      .results h2 {
        font-family: var(--serif);
        font-size: 1.5rem;
        font-weight: 400;
        margin-bottom: 0.25rem;
      }

      .results .font-name-display {
        color: var(--text-dim);
        font-size: 0.8rem;
        margin-bottom: 1.5rem;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 2rem;
      }

      .metric-card {
        background: var(--surface);
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      .metric-card .metric-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-dim);
      }

      .metric-card .metric-value {
        font-size: 1.6rem;
        font-weight: 500;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }

      .metric-card .metric-css {
        font-size: 0.72rem;
        color: var(--text-dim);
        margin-top: 0.25rem;
        word-break: break-all;
      }

      .preview-section {
        margin-top: 2rem;
      }

      .preview-section h3 {
        font-family: var(--serif);
        font-size: 1.15rem;
        font-weight: 400;
        margin-bottom: 1rem;
      }

      .preview-row {
        display: flex;
        gap: 1px;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 0.75rem;
      }

      .preview-cell {
        flex: 1;
        background: var(--surface);
        padding: 1.25rem;
      }

      .preview-cell .preview-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-dim);
        margin-bottom: 0.5rem;
      }

      .preview-cell .preview-text {
        font-size: 32px;
        line-height: 1.3;
      }

      .snippet {
        margin-top: 2rem;
      }

      .snippet h3 {
        font-family: var(--serif);
        font-size: 1.15rem;
        font-weight: 400;
        margin-bottom: 1rem;
      }

      .code-block {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.25rem;
        font-size: 0.82rem;
        line-height: 1.7;
        overflow-x: auto;
        white-space: pre;
        color: var(--text-dim);
        position: relative;
      }

      .code-block .kw {
        color: var(--accent);
      }
      .code-block .val {
        color: #e8e4de;
      }
      .code-block .comment {
        color: #4a4a4a;
      }

      .copy-btn {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        background: var(--border);
        color: var(--text-dim);
        font-size: 0.7rem;
        padding: 0.3rem 0.6rem;
        border-radius: 4px;
      }

      .copy-btn:hover {
        background: var(--border-focus);
        color: var(--text);
      }

      canvas {
        display: none;
      }

      @media (max-width: 540px) {
        .metrics-grid {
          grid-template-columns: 1fr;
        }
        .preview-row {
          flex-direction: column;
        }
        body {
          padding: 1.25rem;
        }
        h1 {
          font-size: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>font-size-adjust <span>calculator</span></h1>
        <p>
          Measure a font's metric ratios programmatically. Provide a system font
          name or load a webfont via URL to get the exact values for your CSS.
        </p>
      </header>

      <div class="input-group">
        <label for="fontName">Font Family</label>
        <input
          type="text"
          id="fontName"
          placeholder="e.g. Verdana, Georgia, Fira Code"
        />
      </div>

      <div class="input-group">
        <label for="fontUrl"
          >Font URL
          <span class="optional">(optional — for webfonts)</span></label
        >
        <input
          type="text"
          id="fontUrl"
          placeholder="e.g. https://fonts.gstatic.com/s/...woff2"
        />
      </div>

      <div class="actions">
        <button class="primary" id="measureBtn">Measure</button>
        <span id="status"></span>
      </div>

      <div class="results" id="results">
        <h2>Metrics</h2>
        <div class="font-name-display" id="fontNameDisplay"></div>

        <div class="metrics-grid" id="metricsGrid"></div>

        <div class="preview-section">
          <h3>Visual preview at 32px</h3>
          <div class="preview-row">
            <div class="preview-cell">
              <div class="preview-label">Lowercase sample</div>
              <div class="preview-text" id="previewLower">xphago</div>
            </div>
            <div class="preview-cell">
              <div class="preview-label">Uppercase sample</div>
              <div class="preview-text" id="previewUpper">HAXBQ</div>
            </div>
          </div>
          <div class="preview-row">
            <div class="preview-cell">
              <div class="preview-label">Mixed sample</div>
              <div class="preview-text" id="previewMixed">
                Hamburgevons 0123
              </div>
            </div>
          </div>
        </div>

        <div class="snippet">
          <h3>CSS snippet</h3>
          <div class="code-block" id="codeBlock"></div>
        </div>
      </div>
    </div>

    <canvas id="canvas" width="200" height="200"></canvas>

    <script>
      const $ = (s) => document.querySelector(s);
      const canvas = $('#canvas');
      const ctx = canvas.getContext('2d', {willReadFrequently: true});

      function setStatus(msg, isError = false) {
        const el = $('#status');
        el.textContent = msg;
        el.className = isError ? 'error' : '';
      }

      async function loadFont(name, url) {
        if (!url) {
          // System font — test if available by comparing widths
          return name;
        }

        const face = new FontFace(name, `url(${url})`);
        const loaded = await face.load();
        document.fonts.add(loaded);
        return name;
      }

      function measureChar(fontFamily, char, fontSize) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = `${fontSize}px "${fontFamily}"`;
        ctx.textBaseline = 'alphabetic';
        const metrics = ctx.measureText(char);
        return {
          width: metrics.width,
          ascent: metrics.actualBoundingBoxAscent,
          descent: metrics.actualBoundingBoxDescent,
        };
      }

      function computeMetrics(fontFamily) {
        const size = 100; // large size for precision

        const x = measureChar(fontFamily, 'x', size);
        const H = measureChar(fontFamily, 'H', size);
        const zero = measureChar(fontFamily, '0', size);
        const water = measureChar(fontFamily, '水', size);

        const exHeight = x.ascent / size;
        const capHeight = H.ascent / size;
        const chWidth = zero.width / size;
        const icWidth = water.width / size;
        const icHeight = (water.ascent + water.descent) / size;

        return [
          {
            label: 'ex-height',
            value: exHeight,
            css: `font-size-adjust: ${exHeight.toFixed(4)};`,
            description: 'x-height / font-size',
          },
          {
            label: 'cap-height',
            value: capHeight,
            css: `font-size-adjust: cap-height ${capHeight.toFixed(4)};`,
            description: 'cap-height / font-size',
          },
          {
            label: 'ch-width',
            value: chWidth,
            css: `font-size-adjust: ch-width ${chWidth.toFixed(4)};`,
            description: '"0" advance width / font-size',
          },
          {
            label: 'ic-width',
            value: icWidth,
            css: `font-size-adjust: ic-width ${icWidth.toFixed(4)};`,
            description: '"水" advance width / font-size',
          },
          {
            label: 'ic-height',
            value: icHeight,
            css: `font-size-adjust: ic-height ${icHeight.toFixed(4)};`,
            description: '"水" total height / font-size',
          },
        ];
      }

      function renderResults(fontFamily, metrics) {
        $('#fontNameDisplay').textContent = `"${fontFamily}"`;

        const grid = $('#metricsGrid');
        grid.innerHTML = metrics
          .map(
            (m) => `
    <div class="metric-card">
      <span class="metric-label">${m.label}</span>
      <span class="metric-value">${m.value.toFixed(4)}</span>
      <span class="metric-css">${m.css}</span>
    </div>
  `,
          )
          .join('');

        // Preview
        const ff = `"${fontFamily}", sans-serif`;
        $('#previewLower').style.fontFamily = ff;
        $('#previewUpper').style.fontFamily = ff;
        $('#previewMixed').style.fontFamily = ff;

        // Code snippet
        const ex = metrics.find((m) => m.label === 'ex-height');
        const cap = metrics.find((m) => m.label === 'cap-height');
        const code = `<span class="comment">/* font-size-adjust values for "${fontFamily}" */</span>
<span class="kw">font-size-adjust</span>: <span class="val">${ex.value.toFixed(4)}</span>;             <span class="comment">/* ex-height (default) */</span>
<span class="kw">font-size-adjust</span>: <span class="val">cap-height ${cap.value.toFixed(4)}</span>; <span class="comment">/* cap-height */</span>`;

        $('#codeBlock').innerHTML =
          code +
          `\n<button class="copy-btn" onclick="copySnippet()">Copy</button>`;

        $('#results').classList.add('visible');
      }

      window.copySnippet = function () {
        const text = $('#codeBlock').textContent.replace('Copy', '').trim();
        navigator.clipboard.writeText(text);
        const btn = $('#codeBlock .copy-btn');
        btn.textContent = 'Copied';
        setTimeout(() => (btn.textContent = 'Copy'), 1500);
      };

      $('#measureBtn').addEventListener('click', async () => {
        const name = $('#fontName').value.trim();
        const url = $('#fontUrl').value.trim();

        if (!name) {
          setStatus('Enter a font family name.', true);
          return;
        }

        setStatus('Loading font…');

        try {
          const family = await loadFont(name, url || null);
          setStatus('Measuring…');

          // Small delay to ensure rendering is ready
          await new Promise((r) => setTimeout(r, 100));

          const metrics = computeMetrics(family);
          renderResults(family, metrics);
          setStatus('');
        } catch (e) {
          setStatus(`Failed to load font: ${e.message}`, true);
          console.error(e);
        }
      });

      // Enter key support
      $('#fontName').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') $('#measureBtn').click();
      });
      $('#fontUrl').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') $('#measureBtn').click();
      });
    </script>
  </body>
</html>
